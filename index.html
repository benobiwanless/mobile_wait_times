<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Park Waits" />
  <title>Theme Park Wait Times</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(255,255,255,.08);
      --panel-2: rgba(255,255,255,.12);
      --text: #f4f7fb;
      --muted: #a8b3c5;
      --line: rgba(255,255,255,.14);
      --green: #2ee59d;
      --yellow: #ffd166;
      --orange: #ff9f43;
      --red: #ff5d73;
      --blue: #76a9ff;
      --shadow: 0 18px 50px rgba(0,0,0,.28);
      --radius: 22px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(63,116,255,.35), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(46,229,157,.18), transparent 30rem),
        var(--bg);
      color: var(--text);
    }

    .app {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
    }

    body:not(.park-selected) .post-park {
      display: none !important;
    }

    body:not(.park-selected) footer {
      display: none;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 12px 0 14px;
    }

    h1 {
      margin: 4px 4px 14px;
      font-size: clamp(1.45rem, 7vw, 2rem);
      letter-spacing: -.045em;
      line-height: 1.05;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    input, select, button {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.1);
      color: var(--text);
      padding: 14px 14px;
      font: inherit;
      outline: none;
      box-shadow: none;
    }

    input::placeholder { color: rgba(244,247,251,.55); }
    select { appearance: none; }
    option { color: #111; }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 10px;
    }

    .quick-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 2px 2px;
      scrollbar-width: none;
    }

    .quick-row::-webkit-scrollbar { display: none; }

    button {
      cursor: pointer;
      font-weight: 750;
      background: rgba(255,255,255,.11);
      color: var(--text);
      border: 1px solid var(--line);
    }

    #refreshBtn {
      background: linear-gradient(135deg, rgba(118,169,255,.95), rgba(46,229,157,.85));
      color: #08111d;
      border: 0;
    }

    button.secondary {
      background: rgba(255,255,255,.11);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.chip {
      flex: 0 0 auto;
      width: auto;
      padding: 9px 12px;
      font-size: .82rem;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.chip.active {
      background: rgba(118,169,255,.25);
      border-color: rgba(118,169,255,.55);
    }

    button:disabled { opacity: .55; cursor: not-allowed; }

    .statusbar {
      margin: 10px 2px 0;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: .8rem;
      flex-wrap: wrap;
    }

    body:not(.park-selected) #updatedText {
      display: none;
    }

    .park-summary {
      position: sticky;
      top: max(8px, env(safe-area-inset-top));
      z-index: 20;
      margin: 12px 0;
      background: rgba(20, 29, 45, .94);
      backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .summary-title-row {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .park-summary h2 {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: -.025em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-fav-btn {
      min-height: 38px;
      height: 38px;
      padding: 0;
      border-radius: 999px;
      font-size: 1.15rem;
      line-height: 1;
      background: rgba(255,255,255,.11);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .summary-fav-btn.is-favorite {
      background: rgba(255, 209, 102, .2);
      border-color: rgba(255, 209, 102, .55);
      color: var(--yellow);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.45;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    #longestWaitText {
      color: var(--text);
      font-weight: 750;
    }

    .list { display: grid; gap: 12px; }

    .group {
      display: grid;
      gap: 10px;
    }

    .group-title {
      margin: 8px 4px 0;
      color: var(--muted);
      font-weight: 850;
      font-size: .83rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .ride {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .ride h2 {
      margin: 0 0 8px;
      font-size: 1.03rem;
      line-height: 1.2;
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .8rem;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,.06);
      color: var(--muted);
      white-space: nowrap;
    }

    .pill.operating, .pill.open { color: var(--green); border-color: rgba(46,229,157,.35); }
    .pill.down, .pill.closed, .pill.refurbishment { color: var(--red); border-color: rgba(255,93,115,.35); }
    .pill.virtual { color: var(--blue); border-color: rgba(118,169,255,.35); }

    .wait {
      min-width: 82px;
      text-align: right;
      font-weight: 950;
      font-size: 1.55rem;
      letter-spacing: -.05em;
    }

    .wait small {
      display: block;
      font-size: .72rem;
      color: var(--muted);
      font-weight: 650;
      letter-spacing: 0;
      margin-top: 2px;
    }

    .wait.green { color: var(--green); }
    .wait.yellow { color: var(--yellow); }
    .wait.orange { color: var(--orange); }
    .wait.red { color: var(--red); }

    .empty, .error {
      text-align: center;
      padding: 26px 18px;
      color: var(--muted);
    }

    .error { color: #ffd1d8; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin: 24px 4px 0;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.45;
      text-align: center;
    }

    @media (min-width: 620px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .wide { grid-column: span 2; }
      .button-row { grid-column: span 2; }
      .action-row { grid-column: span 2; }
    }

    @media (max-width: 420px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
      .action-row { grid-template-columns: 1fr 120px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Theme Park Wait Times</h1>
<section class="controls" aria-label="Controls">
        <input id="parkSearch" class="wide" type="search" placeholder="Search parks: EPCOT, Universal, Tokyo…" autocomplete="off" />
        <select id="parkSelect" class="wide" aria-label="Choose a park">
          <option value="">Loading parks…</option>
        </select>

        <div class="quick-row wide" aria-label="Quick park filters">
          <button class="chip active" data-filter="">All</button>
          <button class="chip" data-filter="favorite">★ Favorites</button>
        </div>

        <select id="rideSelect" class="wide post-park" aria-label="Choose a ride" disabled>
          <option value="">Choose a park first</option>
        </select>

        <div class="action-row wide post-park">
          <button id="refreshBtn" disabled>Refresh</button>
          <select id="sortSelect" aria-label="Sort rides" disabled>
            <option value="wait" selected>Longest First</option>
            <option value="name">Sort: Name</option>
          </select>
        </div>
        <button id="installBtn" class="secondary wide" hidden>Install app</button>
      </section>

      <div class="statusbar">
        <span id="statusText">Starting up…</span>
        <span id="updatedText"></span>
      </div>
    </header>

    <section id="summary" class="park-summary" hidden>
      <div class="summary-title-row">
        <h2 id="summaryParkName">Selected Park</h2>
        <button id="summaryFavoriteBtn" class="summary-fav-btn" title="Favorite park" aria-label="Favorite park">☆</button>
      </div>
      <div class="summary-line">
        <span id="openClosedText">—</span>
        <span id="avgWaitText">Average Wait: —</span>
      </div>
      <div class="summary-line">
        <span id="longestWaitText">Longest: —</span>
        <span id="summaryUpdatedText">Updated —</span>
      </div>
    </section>

    <section id="list" class="list" aria-live="polite"><div class="card empty">Choose a park to see live wait times.</div></section>

    <footer class="post-park">
      Data from ThemeParks.wiki. Auto-refresh runs every 5 minutes.
    </footer>
  </main>

  <script>
    const API = "https://api.themeparks.wiki/v1";
    const FIVE_MINUTES = 5 * 60 * 1000;
    const FAVORITES_KEY = "tpw.favoriteParks.v1";

    const els = {
      parkSearch: document.querySelector("#parkSearch"),
      parkSelect: document.querySelector("#parkSelect"),
      rideSelect: document.querySelector("#rideSelect"),
      installBtn: document.querySelector("#installBtn"),
      refreshBtn: document.querySelector("#refreshBtn"),
      sortSelect: document.querySelector("#sortSelect"),
      statusText: document.querySelector("#statusText"),
      updatedText: document.querySelector("#updatedText"),
      summary: document.querySelector("#summary"),
      summaryParkName: document.querySelector("#summaryParkName"),
      summaryFavoriteBtn: document.querySelector("#summaryFavoriteBtn"),
      openClosedText: document.querySelector("#openClosedText"),
      avgWaitText: document.querySelector("#avgWaitText"),
      longestWaitText: document.querySelector("#longestWaitText"),
      summaryUpdatedText: document.querySelector("#summaryUpdatedText"),
      list: document.querySelector("#list"),
      chips: Array.from(document.querySelectorAll(".chip")),
    };

    const state = {
      parks: [],
      currentParkId: "",
      live: [],
      sortMode: "wait",
      lastFetch: 0,
      filter: "",
      favorites: new Set(JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]")),
      autoRefreshTimer: null,
      deferredInstallPrompt: null,
    };

    function setStatus(message, loading = false) {
      els.statusText.innerHTML = loading ? `<span class="spinner"></span>${message}` : message;
    }

    function setParkSelected(isSelected) {
      document.body.classList.toggle("park-selected", Boolean(isSelected));
    }

    function normalizeStatus(status = "") {
      return String(status || "UNKNOWN").toUpperCase().replaceAll("_", " ");
    }

    function groupName(entry) {
      const status = normalizeStatus(entry.status);
      return status === "OPERATING" ? "Open" : "Closed";
    }

    function getStandbyWait(entry) {
      const q = entry.queue || {};
      const standby = q.STANDBY || q.standby || q.Standby;
      const wait = standby?.waitTime ?? standby?.wait_time ?? entry.waitTime ?? entry.wait_time;
      return Number.isFinite(Number(wait)) ? Number(wait) : null;
    }

    function waitColor(wait) {
      if (wait === null) return "";
      if (wait <= 20) return "green";
      if (wait <= 45) return "yellow";
      if (wait <= 75) return "orange";
      return "red";
    }

    function formatTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function debounce(fn, ms = 180) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }

    async function fetchJson(url) {
      const res = await fetch(url, { headers: { "Accept": "application/json" } });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function flattenParks(payload) {
      const destinations = payload.destinations || payload || [];
      return destinations.flatMap(destination => {
        const destinationName = destination.name || "Unknown destination";
        return (destination.parks || [])
          .filter(park => park.id && park.name)
          .map(park => ({
            id: park.id,
            name: park.name,
            destinationName,
            timezone: park.timezone || destination.timezone || "",
          }));
      }).sort((a, b) => {
        const af = state.favorites.has(a.id) ? 0 : 1;
        const bf = state.favorites.has(b.id) ? 0 : 1;
        return af - bf || `${a.name} ${a.destinationName}`.localeCompare(`${b.name} ${b.destinationName}`);
      });
    }

    function parkMatchesFilter(park) {
      const haystack = `${park.name} ${park.destinationName}`.toLowerCase();
      if (!state.filter) return true;
      if (state.filter === "favorite") return state.favorites.has(park.id);
      return haystack.includes(state.filter);
    }

    function renderParkOptions() {
      const q = els.parkSearch.value.trim().toLowerCase();
      const filtered = state.parks.filter(park =>
        parkMatchesFilter(park) && `${park.name} ${park.destinationName}`.toLowerCase().includes(q)
      );

      els.parkSelect.innerHTML = "";
      if (!filtered.length) {
        els.parkSelect.append(new Option("No parks found", ""));
        return;
      }

      els.parkSelect.append(new Option(`Choose a park (${filtered.length})`, ""));
      for (const park of filtered) {
        const star = state.favorites.has(park.id) ? "★ " : "";
        const option = new Option(`${star}${park.name} — ${park.destinationName}`, park.id);
        els.parkSelect.append(option);
      }

      if (filtered.some(p => p.id === state.currentParkId)) {
        els.parkSelect.value = state.currentParkId;
      }
    }

    async function loadParks() {
      setStatus("Loading supported parks…", true);
      els.parkSelect.disabled = true;
      try {
        const payload = await fetchJson(`${API}/destinations`);
        state.parks = flattenParks(payload);
        renderParkOptions();
        setStatus(`Choose a park to begin.`);
        els.parkSelect.disabled = false;
      } catch (err) {
        setStatus("Could not load parks.");
        els.list.innerHTML = `<div class="card error">ThemeParks.wiki could not be reached: ${escapeHtml(err.message)}</div>`;
      }
    }

    function startAutoRefresh() {
      clearInterval(state.autoRefreshTimer);
      state.autoRefreshTimer = setInterval(() => {
        if (els.parkSelect.value && !document.hidden) loadLiveData(true, true);
      }, FIVE_MINUTES);
    }

    async function loadLiveData(force = false, isAuto = false) {
      const parkId = els.parkSelect.value;
      if (!parkId) return;

      const now = Date.now();
      if (!force && parkId === state.currentParkId && now - state.lastFetch < FIVE_MINUTES) {
        renderRides();
        return;
      }

      state.currentParkId = parkId;
      setParkSelected(true);
      state.lastFetch = now;
      state.live = [];
      els.rideSelect.disabled = true;
      els.rideSelect.innerHTML = `<option value="">Loading rides…</option>`;
      els.refreshBtn.disabled = true;
      els.sortSelect.disabled = true;
      els.summary.hidden = true;
      if (!isAuto) els.list.innerHTML = "";
      setStatus(isAuto ? "Auto-refreshing wait times…" : "Loading live wait times…", true);

      try {
        const payload = await fetchJson(`${API}/entity/${parkId}/live`);
        state.live = payload.liveData || payload || [];
        populateRideDropdown();
        els.updatedText.textContent = `Updated ${new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;
        els.refreshBtn.disabled = false;
        els.sortSelect.disabled = false;
        setStatus("Live wait times loaded.");
        renderRides();
        startAutoRefresh();
      } catch (err) {
        els.refreshBtn.disabled = false;
        setStatus("Could not load wait times.");
        els.list.innerHTML = `<div class="card error">Live data failed: ${escapeHtml(err.message)}</div>`;
      }
    }

    function getAllAttractions() {
      return state.live.filter(entry => entry.entityType === "ATTRACTION" || entry.entityType === "RIDE" || entry.queue);
    }

    function getRideKey(entry) {
      return entry.id || entry.entityId || entry.name || "";
    }

    function populateRideDropdown() {
      const attractions = getAllAttractions().sort((a, b) => String(a.name).localeCompare(String(b.name)));
      els.rideSelect.innerHTML = "";

      if (!attractions.length) {
        els.rideSelect.append(new Option("No rides available", ""));
        els.rideSelect.disabled = true;
        return;
      }

      els.rideSelect.append(new Option(`All rides (${attractions.length})`, ""));
      for (const ride of attractions) {
        const wait = getStandbyWait(ride);
        const suffix = wait === null ? "closed" : `${wait} min`;
        els.rideSelect.append(new Option(`${ride.name || "Unnamed attraction"} — ${suffix}`, getRideKey(ride)));
      }
      els.rideSelect.disabled = false;
    }

    function sortRides(rides) {
      return rides.sort((a, b) => {
        const groupOrder = groupName(a).localeCompare(groupName(b));

        if (state.sortMode === "name") {
          return groupOrder || String(a.name).localeCompare(String(b.name));
        }

        const aw = getStandbyWait(a);
        const bw = getStandbyWait(b);
        if (aw === null && bw === null) return groupOrder || String(a.name).localeCompare(String(b.name));
        if (aw === null) return groupOrder || 1;
        if (bw === null) return groupOrder || -1;
        return groupOrder || bw - aw || String(a.name).localeCompare(String(b.name));
      });
    }

    function getFilteredRides() {
      const selectedRide = els.rideSelect.value;
      let rides = getAllAttractions();
      if (selectedRide) rides = rides.filter(entry => String(getRideKey(entry)) === selectedRide);
      return sortRides(rides);
    }

    function renderRides() {
      const rides = getFilteredRides();
      const operating = rides.filter(r => normalizeStatus(r.status) === "OPERATING").length;
      const waits = rides.map(getStandbyWait).filter(v => v !== null);
      const avg = waits.length ? Math.round(waits.reduce((a, b) => a + b, 0) / waits.length) : null;
      const high = waits.length ? Math.max(...waits) : null;

      const park = state.parks.find(p => p.id === state.currentParkId);
      const closed = rides.filter(r => {
        const s = normalizeStatus(r.status);
        return s.includes("CLOSED") || s.includes("DOWN") || s.includes("REFURBISHMENT");
      }).length;
      const longestRide = high === null ? null : rides.find(r => getStandbyWait(r) === high);

      els.summary.hidden = false;
      els.summaryParkName.textContent = park ? park.name : "Selected Park";
      updateSummaryFavoriteButton();
      els.openClosedText.textContent = `${operating} Open • ${closed} Closed • ${rides.length} Attractions`;
      els.avgWaitText.textContent = avg === null ? "Average Wait: —" : `Average Wait: ${avg} min`;
      els.longestWaitText.textContent = high === null || !longestRide ? "Longest: —" : `Longest: ${longestRide.name} • ${high} min`;
      els.summaryUpdatedText.textContent = els.updatedText.textContent || "Updated —";

      if (!rides.length) {
        els.list.innerHTML = `<div class="card empty">No attractions match your selection, or this park has no live attraction data right now.</div>`;
        return;
      }

      const groups = new Map();
      for (const ride of rides) {
        const name = groupName(ride);
        if (!groups.has(name)) groups.set(name, []);
        groups.get(name).push(ride);
      }

      const preferredOrder = ["Open", "Closed"];
      const groupHtml = preferredOrder
        .filter(name => groups.has(name))
        .map(name => `
          <section class="group">
            <h2 class="group-title">${escapeHtml(name)} · ${groups.get(name).length}</h2>
            ${groups.get(name).map(renderRideCard).join("")}
          </section>
        `).join("");

      els.list.innerHTML = groupHtml;
    }

    function renderRideCard(entry) {
      const wait = getStandbyWait(entry);
      const status = groupName(entry);
      const lastUpdated = formatTime(entry.lastUpdated);
      const statusClass = status.toLowerCase();
      const color = waitColor(wait);
      return `
        <article class="card ride">
          <div>
            <h2>${escapeHtml(entry.name || "Unnamed attraction")}</h2>
            <div class="meta">
              <span class="pill ${statusClass}">${escapeHtml(status.toLowerCase())}</span>
              ${lastUpdated ? `<span>Last update ${lastUpdated}</span>` : ""}
            </div>
          </div>
          <div class="wait ${color}">${wait === null ? "—" : wait}<small>${wait === null ? "no wait" : "min"}</small></div>
        </article>`;
    }

    function updateSummaryFavoriteButton() {
      const parkId = state.currentParkId || els.parkSelect.value;
      const isFav = state.favorites.has(parkId);
      els.summaryFavoriteBtn.textContent = isFav ? "★" : "☆";
      els.summaryFavoriteBtn.classList.toggle("is-favorite", isFav);
      els.summaryFavoriteBtn.title = isFav ? "Remove favorite" : "Favorite park";
      els.summaryFavoriteBtn.setAttribute("aria-label", isFav ? "Remove favorite" : "Favorite park");
    }

    function toggleSummaryFavorite() {
      const parkId = state.currentParkId || els.parkSelect.value;
      if (!parkId) return;

      if (state.favorites.has(parkId)) state.favorites.delete(parkId);
      else state.favorites.add(parkId);

      localStorage.setItem(FAVORITES_KEY, JSON.stringify([...state.favorites]));
      state.parks = [...state.parks].sort((a, b) => {
        const af = state.favorites.has(a.id) ? 0 : 1;
        const bf = state.favorites.has(b.id) ? 0 : 1;
        return af - bf || `${a.name} ${a.destinationName}`.localeCompare(`${b.name} ${b.destinationName}`);
      });

      renderParkOptions();
      updateSummaryFavoriteButton();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#039;", '"': "&quot;"
      }[char]));
    }

    function setupPwa() {
      const manifest = {
        name: "Theme Park Wait Times",
        short_name: "Park Waits",
        start_url: ".",
        display: "standalone",
        background_color: "#07111f",
        theme_color: "#07111f",
        icons: [
          {
            src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='96' fill='#07111f'/><path d='M96 352c64-160 256-160 320 0' fill='none' stroke='#76a9ff' stroke-width='34' stroke-linecap='round'/><circle cx='256' cy='196' r='68' fill='#2ee59d'/></svg>`),
            sizes: "512x512",
            type: "image/svg+xml"
          }
        ]
      };
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = "data:application/manifest+json," + encodeURIComponent(JSON.stringify(manifest));
      document.head.append(link);

      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault();
        state.deferredInstallPrompt = event;
        els.installBtn.hidden = false;
      });

      els.installBtn.addEventListener("click", async () => {
        if (!state.deferredInstallPrompt) return;
        state.deferredInstallPrompt.prompt();
        await state.deferredInstallPrompt.userChoice;
        state.deferredInstallPrompt = null;
        els.installBtn.hidden = true;
      });
    }

    els.parkSearch.addEventListener("input", debounce(renderParkOptions));
    els.parkSelect.addEventListener("change", () => {
      if (!els.parkSelect.value) {
        setParkSelected(false);
        els.summary.hidden = true;
        els.list.innerHTML = `<div class="card empty">Choose a park to see live wait times.</div>`;
        setStatus(`Choose a park to begin.`);
        return;
      }
      loadLiveData(true);
    });
    els.rideSelect.addEventListener("change", renderRides);
    els.refreshBtn.addEventListener("click", () => loadLiveData(true));
    els.summaryFavoriteBtn.addEventListener("click", toggleSummaryFavorite);
    els.sortSelect.addEventListener("change", () => {
      state.sortMode = els.sortSelect.value;
      renderRides();
    });

    els.chips.forEach(chip => {
      chip.addEventListener("click", () => {
        state.filter = chip.dataset.filter || "";
        els.chips.forEach(c => c.classList.toggle("active", c === chip));
        renderParkOptions();
      });
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && els.parkSelect.value && Date.now() - state.lastFetch >= FIVE_MINUTES) {
        loadLiveData(true, true);
      }
    });

    setupPwa();
    loadParks();
  </script>
</body>
</html>
