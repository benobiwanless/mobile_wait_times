<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
body{margin:0;background:#07111f;color:#fff;font-family:Arial,sans-serif}.app{max-width:700px;margin:auto;padding:14px}h1{font-size:2rem;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}input,select,button{background:#252d3b;color:#fff;border:1px solid #4a5568;border-radius:16px;padding:14px;width:100%;box-sizing:border-box}.row3{display:grid;grid-template-columns:70px 1fr 110px;gap:10px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.card{background:#252d3b;padding:10px;border-radius:14px;text-align:center}
</style></head><body><div class="app"><h1>Theme Park Wait Times</h1><div class="grid"><input placeholder="Search parks..." class="full"><select><option>Choose Park</option></select><select><option>All Rides</option></select><div class="row3 full"><button>⭐</button><button>🔄 Refresh</button><select><option>Wait ⏱</option><option>Name 🔤</option><option>Status 🚦</option></select></div></div><div class="stats"><div class="card"><b>25</b><br>🎢</div><div class="card"><b>18</b><br>🟢</div><div class="card"><b>43m</b><br>⏱</div><div class="card"><b>95m</b><br>🔥</div></div><p style="opacity:.7">Layout preview for testing.</p></div></body></html>
